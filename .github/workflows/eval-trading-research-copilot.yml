name: Eval Trading Research Copilot

on:
  pull_request:
    paths:
      - "01-trading-research-copilot/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 01-trading-research-copilot
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eval
        run: python eval/run_eval.py

      - name: Upload eval results
        uses: actions/upload-artifact@v6
        with:
          name: eval-results
          path: 01-trading-research-copilot/eval/results/summary.json

      - name: Post summary as PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const summary = JSON.parse(
              fs.readFileSync("01-trading-research-copilot/eval/results/summary.json", "utf8")
            );

            const fmtPct = (v) => (v === null || v === undefined ? "n/a" : `${(v * 100).toFixed(1)}%`);

            const bias = summary.bias_accuracy;
            const sanity = summary.candidate_sanity;

            const body = [
              "### Trading Research Copilot — Eval Results",
              "",
              "_Report-only: this check does not gate the PR. See `docs/eval_harness.md` for methodology and limitations (the golden dataset's labels are a human reviewer's judgment call, not objective ground truth)._",
              "",
              "| Metric | Score |",
              "|---|---|",
              `| HTF Bias Accuracy | ${fmtPct(bias.rate)} (${bias.correct}/${bias.total}) |`,
              `| LTF Candidate Sanity-Check Pass Rate | ${fmtPct(sanity.rate)} (${sanity.passed}/${sanity.checked}, ${sanity.skipped_no_near_term_candidate} skipped) |`,
              "",
              "_See the eval-results artifact for the full per-entry breakdown._",
            ].join("\n");

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
