name: Eval Multi-Agent Triage

on:
  pull_request:
    paths:
      - "03-multiagent-triage/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 03-multiagent-triage
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eval
        run: python eval/run_eval.py
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload eval results
        uses: actions/upload-artifact@v6
        with:
          name: eval-results
          path: |
            03-multiagent-triage/eval/results/routing_scorecard.csv
            03-multiagent-triage/eval/results/summary.json

      - name: Post summary as PR comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const summary = JSON.parse(
              fs.readFileSync("03-multiagent-triage/eval/results/summary.json", "utf8")
            );

            const fmtPct = (v) => (v === null || v === undefined ? "n/a" : `${(v * 100).toFixed(1)}%`);

            const body = [
              "### Multi-Agent Triage — Routing Eval Results",
              "",
              "| Metric | Score |",
              "|---|---|",
              `| Routing Accuracy | ${fmtPct(summary.routing_accuracy)} (${summary.num_correct}/${summary.num_queries}) |`,
              "",
              "_See the routing-scorecard artifact for the per-query breakdown._",
            ].join("\n");

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
